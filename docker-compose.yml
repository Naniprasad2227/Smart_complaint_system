version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: ai-complaint-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD-SHELL', 'mongosh --quiet --eval "db.adminCommand({ ping: 1 }).ok" | grep 1']
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  ai-model:
    build:
      context: ./ai-model
    container_name: ai-complaint-ai-model
    restart: unless-stopped
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/docs\", timeout=5)"']
      interval: 25s
      timeout: 8s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: ai-complaint-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/ai_smart_complaint
      JWT_SECRET: replace_with_strong_secret
      REFRESH_TOKEN_SECRET: replace_with_refresh_secret
      AI_SERVICE_URL: http://ai-model:8000/predict
      CLIENT_URL: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      mongodb:
        condition: service_healthy
      ai-model:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://localhost:5000/health\").then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1));"']
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: ai-complaint-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://localhost:3000\").then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1));"']
      interval: 25s
      timeout: 8s
      retries: 5
      start_period: 40s

volumes:
  mongo_data:
