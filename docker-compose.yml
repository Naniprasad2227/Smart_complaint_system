version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: ai-complaint-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  ai-model:
    build:
      context: ./ai-model
    container_name: ai-complaint-ai-model
    restart: unless-stopped
    ports:
      - '8000:8000'

  backend:
    build:
      context: ./backend
    container_name: ai-complaint-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/ai_smart_complaint
      JWT_SECRET: replace_with_strong_secret
      REFRESH_TOKEN_SECRET: replace_with_refresh_secret
      AI_SERVICE_URL: http://ai-model:8000/predict
      CLIENT_URL: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
      - ai-model

  frontend:
    build:
      context: ./frontend
    container_name: ai-complaint-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  mongo_data:
